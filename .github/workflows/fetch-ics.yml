name: Fetch ICS Calendar

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download ICS
        run: |
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://calendar.google.com/calendar/ical/1cc57ba6628e550f3e56cf6eccacbd1bcdd983c2845a20b88a563bdfe3fb165b@group.calendar.google.com/private-66416a86e995cde12eaf88df44c41197/basic.ics" \
            -o piano.ics --fail --silent --show-error

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add piano.ics
          git diff --staged --quiet || git commit -m "chore: aggiorna piano.ics [skip ci]"
          git push
