name: Sync Garmin Activities

on:
  # schedule:
  #   - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Garmin sync script
        env:
          GARMIN_SSO_GUID:  ${{ secrets.GARMIN_SSO_GUID }}
          GARMIN_SSO_GUID2: ${{ secrets.GARMIN_SSO_GUID2 }}
        run: python scripts/scarica_garmin.py

      - name: Commit updated activities
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/activities.json
          git diff --cached --quiet || git commit -m "chore: aggiorna activities.json [skip ci]"
          git push
